apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"

android {
    namespace "com.bisetkaphotosphere"
    compileSdkVersion 35

    defaultConfig {
        applicationId "com.bisetkaphotosphere"
        minSdkVersion 24
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"

        multiDexEnabled true

        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            // Caution! In production, you need to generate your own keystore file.
            // see https://reactnative.dev/docs/signed-apk-android.
            signingConfig signingConfigs.debug
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }

    packagingOptions {
        pickFirst "**/*.so"
    }

    sourceSets {
        main.java.srcDirs += ['src/main/kotlin']
        main.kotlin.srcDirs += ['src/main/kotlin']
    }
}

dependencies {
    implementation fileTree(dir: "libs", include: ["*.jar"])
    implementation "androidx.multidex:multidex:2.0.1"

    //noinspection GradleDynamicVersion
    implementation "com.facebook.react:react-android:0.84.1"
    // hermes-android not available as separate artifact in 0.84.1 - removed

    implementation "org.jetbrains.kotlin:kotlin-stdlib:2.1.20"

    // OpenCV 4.10 — provides the Stitcher, Imgcodecs, and companion JNI libs.
    // The AAR bundles all .so files; no additional cmake/NDK setup is needed.
    implementation("org.opencv:opencv:4.10.0")

    // EXIF orientation handling for captured images
    implementation("androidx.exifinterface:exifinterface:1.3.7")
}
