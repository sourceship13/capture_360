apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

android {
    namespace "com.capture360example"
    compileSdk 35

    defaultConfig {
        applicationId "com.capture360example"
        minSdkVersion 24
        targetSdkVersion 35
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }

    packagingOptions {
        pickFirst "**/libc++_shared.so"
        pickFirst "**/libfbjni.so"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    def reactNativeVersion = "0.83.1"
    implementation("com.facebook.react:react-android:$reactNativeVersion")
    implementation("com.facebook.hermes:hermes-android:0.14.0")

    // Library module
    implementation project(':react-native-bisetka-photosphere')
}
