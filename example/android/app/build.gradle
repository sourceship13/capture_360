apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"

android {
    namespace "com.capture360example"
    compileSdk 35

    buildFeatures {
        buildConfig true
    }

    defaultConfig {
        applicationId "com.capture360example"
        minSdkVersion 24
        targetSdkVersion 35
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }

    packagingOptions {
        pickFirst "**/libc++_shared.so"
        pickFirst "**/libfbjni.so"
    }
}

dependencies {
    def reactNativeVersion = "0.83.1"
    implementation("com.facebook.react:react-android:$reactNativeVersion")

    def jscFlavor = 'org.webkit:android-jsc:+'
    implementation jscFlavor

    // Library module
    implementation project(':react-native-bisetka-photosphere')
}
